<html>
<head><title>Spoons 2</title></head>
<body>
<div id="diOut"></div>
<script>

var lineOff = 99;
var buf=[];

Object.defineProperties(buf, { setVal: { value({x, y}, v) { this[x + y * lineOff] = v; } }, getVal: { value({x, y}) { return this[x + y * lineOff];} }});

var curSz=2;
buf.setVal({x:0,y:0},1);
buf.setVal({x:1,y:0},2);
buf.setVal({x:0,y:1},3);


function* iterate(n) {
    for (let j = 0; j < n; ++j) {
		const maxI = (j >= n/2) ? n/2 : n;
        for (let i = 0; i < maxI; ++i) {
            yield [ i, j ];
        }
    }
}

function expand(){
	var indOff=curSz**2 / 4*3 ,tmp;
	var sz=curSz*2,s=curSz/2;
	if (sz>lineOff) throw "need bigger buffer"; //TODO: auto quadruple buffer size
	tmp=indOff;
	for (var [i, j] of iterate(curSz) ){
		var [i2,j2] = [i + s, j+ s];
		buf.setVal({x:i2,y:j2}, buf.getVal({x:i,y:j}) + tmp);
	}
	tmp+=indOff;
	for (var [i, j] of iterate(curSz) ){
		var [i2,j2] = [-j + s*4-1, i];
		buf.setVal({x:i2,y:j2}, buf.getVal({x:i,y:j}) + tmp);
	}
	tmp+=indOff;
	for (var [i, j] of iterate(curSz) ){
		var [i2,j2] = [j, -i+ s*4-1];
		buf.setVal({x:i2,y:j2}, buf.getVal({x:i,y:j}) + tmp);
	}
	curSz=sz;
}
function str(x){ return x==null?"0":String(x);}
function display(){
	var txt="", tmp=0, sep;
	for (var j=0;j<curSz;++j) {
	  for (var i=0;i<curSz;++i) {
		tmp= Math.max(tmp, str(buf.getVal({x:i,y:j})).length);
	}}

	for (var j=0;j<curSz;++j) {
	  sep="";
	  for (var i=0;i<curSz;++i) {
		txt+= sep + str(buf.getVal({x:i,y:j})).padStart(tmp," ");
		sep=" ";
	}txt+="\n";}
	console.log(txt);
}
expand();
expand();
expand();
display();

</script>
</body>
</html>
